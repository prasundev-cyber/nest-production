# traefik/traefik.yml  — Static configuration

api:
  dashboard: true
  insecure: false   # dashboard only via HTTPS router defined in compose

ping:
  entryPoint: "ping"

log:
  level: WARN
  format: json

accessLog:
  format: json
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop
      names:
        X-Forwarded-For: keep
        User-Agent: keep

entryPoints:
  ping:
    address: ":8082"

  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
        domains:
          - main: "${DOMAIN}"
            sans:
              - "*.${DOMAIN}"
      middlewares:
        - securityHeaders@file
    http3:
      advertisedPort: 443

certificatesResolvers:
  letsencrypt:
    acme:
      email: "${ACME_EMAIL}"
      storage: /certificates/acme.json
      # Use tlsChallenge for single-domain or dnsChallenge for wildcard
      tlsChallenge: {}
      # For wildcard certs via Cloudflare:
      # dnsChallenge:
      #   provider: cloudflare
      #   resolvers:
      #     - "1.1.1.1:53"
      #     - "8.8.8.8:53"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: proxy
    watch: true
  file:
    directory: /config
    watch: true

metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true
    addRoutersLabels: true
    entryPoint: ping
