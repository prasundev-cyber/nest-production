name: Production Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false  # Never cancel in-flight deploys

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────
  #  JOB 1: Test
  # ──────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:cov
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-not-production
          NODE_ENV: test

      - name: E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-not-production
          NODE_ENV: test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # ──────────────────────────────────────────────────────────
  #  JOB 2: Build & Push Docker Image
  # ──────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.run_number }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

  # ──────────────────────────────────────────────────────────
  #  JOB 3: Deploy to VPS (Zero-downtime)
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production VPS
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout (for compose files)
        uses: actions/checkout@v4

      - name: Copy compose files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.prod.yml,traefik/,monitoring/"
          target: "/opt/app"
          overwrite: true

      - name: Deploy with zero-downtime rolling update
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail

            cd /opt/app

            # Log in to registry on the VPS
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the new image
            IMAGE_TAG=sha-$(echo "${{ github.sha }}" | head -c7)
            docker pull ghcr.io/${{ github.repository }}:${IMAGE_TAG}

            # Export env for docker compose
            export IMAGE_TAG=${IMAGE_TAG}
            export DOCKER_REGISTRY=ghcr.io
            export IMAGE_NAME=${{ github.repository }}

            # Rolling update — one replica at a time
            docker compose -f docker-compose.prod.yml \
              up -d --no-deps --scale api=3 \
              --update-order start-first api

            # Wait for health checks
            echo "Waiting for services to be healthy..."
            sleep 15

            # Verify at least 2 replicas are healthy
            HEALTHY=$(docker compose -f docker-compose.prod.yml ps api \
              --format json | python3 -c \
              "import json,sys; data=json.load(sys.stdin); \
               print(sum(1 for s in data if s.get('Health')=='healthy'))")

            if [ "$HEALTHY" -lt 2 ]; then
              echo "DEPLOY FAILED: Only $HEALTHY healthy replicas. Rolling back..."
              # Pull the previous image tag and redeploy
              PREV_TAG=$(docker images ghcr.io/${{ github.repository }} \
                --format '{{.Tag}}' | grep '^sha-' | sed -n '2p')
              if [ -n "$PREV_TAG" ]; then
                export IMAGE_TAG=${PREV_TAG}
                docker compose -f docker-compose.prod.yml \
                  up -d --no-deps --scale api=3 api
                echo "Rolled back to ${PREV_TAG}"
              else
                echo "No previous image found for rollback"
              fi
              exit 1
            fi

            echo "Deploy successful. $HEALTHY/3 replicas healthy."

            # Prune old images
            docker image prune -f --filter "until=48h"

      - name: Notify on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # Send alert to Slack / webhook
            curl -s -X POST "${{ secrets.SLACK_WEBHOOK }}" \
              -H 'Content-type: application/json' \
              -d '{"text":"🚨 *Production deploy FAILED* for `${{ github.repository }}` — commit `${{ github.sha }}`"}'

  # ──────────────────────────────────────────────────────────
  #  JOB 4: Smoke Test after Deploy
  # ──────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://api.${{ secrets.DOMAIN }}/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed (HTTP $STATUS). Retrying in 10s..."
            sleep 10
          done
          echo "Smoke test FAILED after 5 attempts"
          exit 1
