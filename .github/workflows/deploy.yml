name: Production Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy even if tests fail"
        required: false
        default: "false"

concurrency:
  group: production-deploy
  cancel-in-progress: false  # Never cancel in-flight deploys

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────
  #  JOB 1: Test
  # ──────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:cov
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-not-production
          NODE_ENV: test

      - name: E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-not-production
          NODE_ENV: test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # ──────────────────────────────────────────────────────────
  #  JOB 2: Build & Push Docker Image
  # ──────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.run_number }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

  # ──────────────────────────────────────────────────────────
  #  JOB 3: Deploy to VPS (Zero-downtime)
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production VPS
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout (for compose files)
        uses: actions/checkout@v4

      - name: Copy compose files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "docker-compose.prod.yml,traefik/,monitoring/"
          target: "/opt/app"
          overwrite: true

      - name: Deploy with zero-downtime rolling update
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail

            cd /opt/app

            # Log in to GHCR on the VPS
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Resolve the image tag (first 7 chars of SHA)
            IMAGE_TAG=sha-$(echo "${{ github.sha }}" | cut -c1-7)
            echo "Deploying image tag: ${IMAGE_TAG}"

            # Save currently running tag for rollback before pulling new image
            # Use running container image instead of local image list to avoid stale rollbacks.
            PREV_IMAGE=$(docker compose -f docker-compose.prod.yml ps -q api | head -n1 | xargs -r docker inspect --format '{{.Config.Image}}' 2>/dev/null || true)
            PREV_TAG=""
            if [ -n "${PREV_IMAGE}" ]; then
              PREV_TAG="${PREV_IMAGE##*:}"
              if ! echo "${PREV_TAG}" | grep -q '^sha-'; then
                PREV_TAG=""
              fi
            fi
            echo "Current running image: ${PREV_IMAGE:-none}"
            echo "Rollback tag candidate: ${PREV_TAG:-none}"

            # Pull the new image
            docker pull ghcr.io/${{ github.repository }}:${IMAGE_TAG}
            docker image inspect ghcr.io/${{ github.repository }}:${IMAGE_TAG} --format 'Pulled image digest: {{index .RepoDigests 0}}' || true

            # Write IMAGE_TAG into .env so compose picks it up
            # (avoids exporting vars that don't survive across ssh sessions)
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|" .env || \
              echo "IMAGE_TAG=${IMAGE_TAG}" >> .env
            sed -i "s|^DOCKER_REGISTRY=.*|DOCKER_REGISTRY=ghcr.io|" .env || \
              echo "DOCKER_REGISTRY=ghcr.io" >> .env
            sed -i "s|^IMAGE_NAME=.*|IMAGE_NAME=${{ github.repository }}|" .env || \
              echo "IMAGE_NAME=${{ github.repository }}" >> .env
            echo "Effective deploy image: ghcr.io/${{ github.repository }}:${IMAGE_TAG}"

            # Ensure stateful dependencies exist before rotating API replicas.
            docker compose -f docker-compose.prod.yml up -d postgres redis traefik

            # Zero-downtime: stop one old replica, start one new — repeat x3
            # --update-order is Swarm-only; for plain Compose we scale manually
            echo "Starting rolling update..."
            docker compose -f docker-compose.prod.yml up -d --no-deps --scale api=4 api
            sleep 10
            docker compose -f docker-compose.prod.yml up -d --no-deps --scale api=3 api
            sleep 10

            # Wait for replicas to become healthy (poll up to 180s)
            echo "Waiting for health checks (up to 180s)..."
            HEALTHY=0
            for i in $(seq 1 18); do
              HEALTHY=$(docker compose -f docker-compose.prod.yml ps api --format json 2>/dev/null | python3 -c 'import json,sys; raw=sys.stdin.read().strip(); data=json.loads(raw) if raw else []; items=data if isinstance(data,list) else ([data] if isinstance(data,dict) else []); print(sum(1 for item in items if isinstance(item,dict) and str(item.get("Health","")).strip().lower().startswith("healthy")))' 2>/dev/null || echo "0")

              echo "Health attempt ${i}/18: ${HEALTHY}/3 healthy"
              if [ "${HEALTHY}" -ge 2 ]; then
                break
              fi
              sleep 10
            done

            echo "Healthy replicas: ${HEALTHY}/3"

            if [ "${HEALTHY}" -lt 2 ]; then
              echo "DEPLOY FAILED: only ${HEALTHY} healthy replicas."

              # Rollback: re-deploy the previous image tag if we have one
              if [ -n "${PREV_TAG}" ]; then
                echo "Rolling back to ${PREV_TAG}..."
                sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${PREV_TAG}|" .env
                docker compose -f docker-compose.prod.yml \
                  up -d --no-deps --scale api=3 api
                echo "Rollback complete."
              else
                echo "No previous image tag found — cannot auto-rollback."
              fi
              exit 1
            fi

            echo "Deploy successful. ${HEALTHY}/3 replicas healthy."

            # Prune images older than 48h to reclaim disk
            docker image prune -f --filter "until=48h"

      - name: Notify on failure
        if: failure()
        # Run on the GitHub runner — no SSH needed for a webhook call
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK }}" ]; then
            curl -s -X POST "${{ secrets.SLACK_WEBHOOK }}" \
              -H 'Content-type: application/json' \
              -d "{\"text\":\"Deploy FAILED for \`${{ github.repository }}\` commit \`${{ github.sha }}\`\"}"
          else
            echo "SLACK_WEBHOOK secret not set — skipping Slack notification"
          fi

  # ──────────────────────────────────────────────────────────
  #  JOB 4: Smoke Test after Deploy
  # ──────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://api.${{ secrets.DOMAIN }}/api/v1/health/ready)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed (HTTP $STATUS). Retrying in 10s..."
            sleep 10
          done
          echo "Smoke test FAILED after 5 attempts"
          exit 1